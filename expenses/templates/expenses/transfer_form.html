{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Перевод между счетами{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-secondary text-white">
                <h4 class="mb-0">Перевод средств</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form|crispy }}
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-secondary">Выполнить перевод</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
